<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>UserAgent & Misc Headers</title>
        <link rel="stylesheet" href="styles.css">
    </head>

<body>
    <div class="main-layout">
        <div class="scrollable-content">
            <div class="header">
                <h1>Headers</h1>
                <div class="status-indicator">
                    <span id="status-dot" class="dot pending"></span>
                    <span id="status-text">Disabled</span>
                </div>
            </div>

            <div class="card">
                <div class="form-group">
                    <div class="radio-label" id="toggle-container">
                        <input type="checkbox" id="enable-toggle">
                        <label for="enable-toggle">Enable for this tab</label>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>User-Agent</h2>
                <div class="form-group">
                    <textarea id="user-agent-input" class="textarea-field" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="reset-ua-btn" class="btn-donate btn-secondary">Reset to Default</button>
                </div>
            </div>

            <div class="card">
                <h2>Custom Headers</h2>
                <div id="headers-list" class="source-list">
                    <!-- Headers will be added here dynamically -->
                </div>

                <div class="mt-3 border-top pt-3">
                    <div class="form-group">
                        <input type="text" id="new-header-name" class="input-field mb-2" placeholder="Header Name">
                        <input type="text" id="new-header-value" class="input-field" placeholder="Header Value">
                    </div>
                    <button id="add-header-btn" class="btn-donate btn-full-width">Add Header</button>
                </div>
            </div>
        </div>

        <div class="footer fixed-footer">
            <div class="footer-donate">
                <a href="https://www.paypal.com/donate/?hosted_button_id=ZB5Y7JEMGEGAS" target="_blank"
                    class="btn-donate">
                    Donate with PayPal
                </a>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
